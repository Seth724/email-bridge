name: Daily Email Digest

on:
  schedule:
    # Runs at 7:00 AM UTC every day
    # Use https://crontab.guru/ to convert to your timezone
    # Example: 0 6 * * * = 6 AM UTC, 0 12 * * * = 12 PM UTC
    - cron: '0 7 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run email check
        run: python standalone/bot.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_IMAP_SERVER: ${{ vars.GMAIL_IMAP_SERVER || 'imap.gmail.com' }}
          GMAIL_IMAP_PORT: ${{ vars.GMAIL_IMAP_PORT || '993' }}
          
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # Optional: LangSmith tracing
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: ${{ vars.LANGCHAIN_TRACING_V2 || 'false' }}
          LANGCHAIN_PROJECT: email-bridge
          
          # Optional: Enable custom rules
          USE_CUSTOM_RULES: ${{ vars.USE_CUSTOM_RULES || 'true' }}
