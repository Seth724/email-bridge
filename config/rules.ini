# Custom Email Classification Rules
# Edit this file to personalize how your emails are classified
# Format: pattern = category
# Categories: URGENT, IMPORTANT, NORMAL, SPAM

# ===== SENDER-BASED RULES =====
# Emails from these senders will be classified as specified

[senders_urgent]
# CEOs, executives, emergency contacts
ceo@company.com = URGENT
boss@company.com = URGENT
emergency@company.com = URGENT
hr@company.com = URGENT

[senders_important]
# Colleagues, clients, important services
team@company.com = IMPORTANT
client@example.com = IMPORTANT
support@bank.com = IMPORTANT
noreply@google.com = IMPORTANT

[senders_normal]
# Newsletters, social media
newsletter@medium.com = NORMAL
notifications@linkedin.com = NORMAL
noreply@facebook.com = NORMAL

[senders_spam]
# Known spam sources
spam@spammer.com = SPAM
noreply@scam.com = SPAM


# ===== SUBJECT-BASED RULES =====
# Keywords in subject line trigger classification

[subject_urgent]
# Time-sensitive keywords
urgent = URGENT
asap = URGENT
emergency = URGENT
flight delayed = URGENT
flight cancelled = URGENT
security alert = URGENT
account compromised = URGENT
password reset = URGENT
interview invitation = URGENT
job offer = URGENT
offer letter = URGENT

[subject_important]
# Important but not urgent
meeting = IMPORTANT
interview = IMPORTANT
invoice = IMPORTANT
payment = IMPORTANT
deadline = IMPORTANT
review = IMPORTANT
feedback = IMPORTANT
approval = IMPORTANT
contract = IMPORTANT
proposal = IMPORTANT

[subject_normal]
# Regular emails
newsletter = NORMAL
digest = NORMAL
weekly = NORMAL
monthly = NORMAL
update = NORMAL
notification = NORMAL

[subject_spam]
# Spam indicators
congratulations you won = SPAM
claim your prize = SPAM
lottery winner = SPAM
nigerian prince = SPAM
work from home = SPAM
make money fast = SPAM


# ===== DOMAIN-BASED RULES =====
# Entire domains can be classified

[domains_urgent]
# Your company domain
yourcompany.com = URGENT

[domains_important]
# Important services
gmail.com = IMPORTANT
microsoft.com = IMPORTANT
amazon.com = IMPORTANT
github.com = IMPORTANT

[domains_normal]
# Social media, newsletters
medium.com = NORMAL
substack.com = NORMAL
twitter.com = NORMAL
instagram.com = NORMAL

[domains_spam]
# Known spam domains
spam.com = SPAM
scam.com = SPAM


# ===== TIME-BASED RULES =====
# Classification changes based on time

[time_rules]
# After hours: only truly urgent emails should notify
after_hours_start = 18  # 6 PM
after_hours_end = 9     # 9 AM
# During after hours, IMPORTANT emails become silent

# Weekend mode
weekend_mode = silent   # Options: silent, normal, urgent_only
